name: Build and Deploy to K3s

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: temiayo/k3s-mission-control

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:latest .
          docker tag $IMAGE_NAME:latest $IMAGE_NAME:${{ github.sha }}

      - name: Push to Docker Hub
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Show kubeconfig file exists
        run: |
          ls -la $HOME/.kube
          test -f $HOME/.kube/config

      - name: Test cluster connection
        run: |
          kubectl version --client
          kubectl cluster-info
          kubectl get nodes

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Show deployments
        run: |
          kubectl get deployments
          kubectl get pods -A

      - name: Update deployment image
        run: |
          kubectl set image deployment/mission-control mission-control=$IMAGE_NAME:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/mission-control --timeout=120s

      - name: Show running pods and service
        run: |
          kubectl get pods -l app=mission-control
          kubectl get service mission-control-service
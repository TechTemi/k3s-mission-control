deploy:
  name: Deploy to K3s
  runs-on: ubuntu-latest
  needs: build-and-push

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Write kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Test cluster connection
      run: |
        kubectl version --client
        kubectl cluster-info
        kubectl get nodes

    - name: Apply manifests
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    - name: Show deployments
      run: kubectl get deployments

    - name: Update deployment image
      run: |
        kubectl set image deployment/mission-control mission-control=temiayo/k3s-mission-control:${{ github.sha }}

    - name: Wait for rollout
      run: kubectl rollout status deployment/mission-control --timeout=120s

    - name: Show running pods and service
      run: |
        kubectl get pods -l app=mission-control
        kubectl get service mission-control-service